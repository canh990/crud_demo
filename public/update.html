<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình cập nhật</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Thanh điều hướng */
        .navbar {
            width: 100%;
            max-width: 800px;
            border: 1px solid #333;
            padding: 10px 0;
            text-align: center;
            margin-bottom: 50px;
        }

        .navbar a {
            text-decoration: none;
            color: black;
            margin: 0 10px;
            font-size: 14px;
        }

        /* Khung chính của Form */
        .container {
            border: 1px solid #333;
            padding: 40px;
            width: 450px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            font-weight: normal;
            margin-bottom: 30px;
        }

        /* Group các dòng input */
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-row label {
            width: 120px;
            font-size: 14px;
            padding-right: 10px;
        }

        .form-row input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #333;
            outline: none;
            text-align: center; /* Để chữ xxx nằm giữa như trong hình */
        }

        /* Footer của form chứa link và nút */
        .form-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 40px;
            gap: 25px;
        }

        .form-footer a {
            color: #4a90e2;
            text-decoration: none;
            font-size: 13px;
        }

        .btn-update {
            background-color: #0b5ed7;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-update:hover {
            background-color: #0a58ca;
        }
    </style>
    <script src="./js/update.js"></script>
</head>
<body>

    <div class="navbar">
        <a href="./list.html">Home</a> | <a href="./index.html">Đăng nhập</a> | <a href="./register.html">Đăng ký</a>
    </div>

    <div class="container">
        <h2>Màn hình cập nhật</h2>
        
        <form>
            <input type="hidden" id="userId">

            <div class="form-row">
                <label>Username</label>
                <input id="username" type="text" placeholder="Nhập username">
            </div>

            <div class="form-row">
                <label>Mật khẩu</label>
                <input id="password" type="password" placeholder="Nhập mật khẩu">
            </div>

            <div class="form-row">
                <label>Nhập lại mật khẩu</label>
                <input id="confirmPassword" type="password" placeholder="Nhập lại mật khẩu">
            </div>

            <div class="form-row">
                <label>Email</label>
                <input id="email" type="email" placeholder="Nhập email">
            </div>

            <div class="form-footer">
                <a href="./list.html">Quay lại danh sách</a>
                <button type="submit" class="btn-update">Cập nhật</button>
            </div>
        </form>
    </div>

</body>
</html>
