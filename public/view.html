<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình chi tiết</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Thanh điều hướng */
        .navbar {
            width: 100%;
            max-width: 800px;
            border: 1px solid #000;
            padding: 10px 0;
            text-align: center;
            margin-bottom: 50px;
        }

        .navbar a {
            text-decoration: none;
            color: black;
            margin: 0 10px;
            font-size: 14px;
        }

        /* Khung hiển thị chi tiết */
        .detail-container {
            border: 1px solid #000;
            padding: 40px;
            width: 450px;
            min-height: 250px;
            position: relative;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            font-weight: normal;
            margin-bottom: 40px;
        }

        /* Dòng thông tin */
        .info-row {
            display: flex;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .info-label {
            width: 120px;
            color: #333;
        }

        .info-value {
            font-weight: bold;
            color: #000;
        }

        /* Nút chỉnh sửa */
        .btn-edit {
            background-color: #0b5ed7;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            position: absolute;
            bottom: 30px;
            right: 40px;
        }

        .btn-edit:hover {
            background-color: #0a58ca;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="./list.html">Home</a> | <a href="./index.html"><b>Đăng xuất</b></a>
    </div>

    <div class="detail-container">
        <h2>Màn hình chi tiết</h2>
        
        <div class="info-row">
            <span class="info-label">Username</span>
            <span class="info-value">test1</span>
        </div>

        <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value">test1@gmail.com</span>
        </div>

        <button class="btn-edit" onclick="window.location.href='./update.html'">Chỉnh sửa</button>
    </div>

</body>
</html>
