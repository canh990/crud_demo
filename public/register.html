<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình đăng ký</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Thanh điều hướng phía trên */
        .navbar {
            width: 100%;
            max-width: 800px;
            border: 1px solid #000;
            padding: 10px 0;
            text-align: center;
            margin-bottom: 50px;
        }

        .navbar a {
            text-decoration: none;
            color: black;
            margin: 0 10px;
        }

        /* Khung đăng ký */
        .register-container {
            border: 1px solid #000;
            padding: 40px;
            width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            font-weight: normal;
        }

        /* Cấu trúc các dòng nhập liệu */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            width: 120px;
            font-size: 14px;
        }

        .form-group input {
            flex: 1;
            padding: 5px;
            border: 1px solid #000;
            outline: none;
        }

        /* Khu vực nút bấm và link */
        .footer-form {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
        }

        .footer-form a {
            color: #4a90e2;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-submit {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-submit:hover {
            background-color: #004494;
        }
    </style>
    <script src="./js/register.js"></script>
</head>
<body>

    <div class="navbar">
        <a href="#">Home</a> | <a href="./index.html">Đăng nhập</a> | <a href="./register.html"><b>Đăng ký</b></a>
    </div>

    <div class="register-container">
        <h2>Màn hình đăng ký</h2>
        
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Nhập username">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>

            <div class="form-group">
                <label>Nhập lại mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Nhập email">
            </div>

            <div class="footer-form">
                <a href="./index.html">Đã có tài khoản</a>
                <button type="submit" class="btn-submit">Đăng ký</button>
            </div>
        </form>
    </div>

</body>
</html>
